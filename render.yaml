# Use this when Render is connected to the Cursor-Popup repo (app at repo root).
# Root Directory in Render must be blank.
#
# Render cron jobs are commented out until launch (no scheduler cost or traffic).
# To enable: uncomment CRON_* env vars on the web service below, then uncomment
# both cron service blocks and set APP_BASE_URL / secrets in the Dashboard.
services:
  - type: web
    name: cursor-popup-portal
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      # Cron auth — uncomment when enabling Render cron services below
      # - key: CRON_SECRET
      #   sync: false
      # - key: CRON_SECRET_KEY
      #   sync: false

